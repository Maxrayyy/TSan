services:
  postgres:
    image: postgres:16-alpine
    container_name: tuosan-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: tuosan
      POSTGRES_PASSWORD: tuosan_dev
      POSTGRES_DB: tuosan
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tuosan-redis
    ports:
      - '6379:6379'

volumes:
  pgdata:
